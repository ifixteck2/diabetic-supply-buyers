<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Portal | Diabetic Supply Buyers</title><style>:root{--g:#19a84a;--d:#0a6f2d;--s:#e9f8ee;--i:#143321;--m:#63756a;--l:#d9eadf;--b:#f7fbf8;--r:#b3261e}*{box-sizing:border-box}body{margin:0;background:var(--b);color:var(--i);font-family:Arial,Helvetica,sans-serif}input,select,textarea,button{font:inherit}button{cursor:pointer}.wrap{margin:auto;max-width:1120px;padding:28px 16px 80px}.panel{background:#fff;border:1px solid var(--l);border-radius:12px;box-shadow:0 12px 34px rgba(20,51,33,.08);margin:0 0 18px;padding:24px}.brand{align-items:center;display:flex;gap:12px;margin-bottom:18px}.mark{align-items:center;background:var(--g);border-radius:12px;color:#fff;display:flex;font-weight:950;height:56px;justify-content:center;width:56px}h1,h2{margin:0;text-transform:uppercase}p{color:var(--m);line-height:1.5}.grid{display:grid;gap:14px}.two{grid-template-columns:repeat(2,1fr)}.three{grid-template-columns:repeat(3,1fr)}label{display:grid;gap:7px;font-size:13px;font-weight:900;text-transform:uppercase}input,select,textarea{border:1px solid var(--l);border-radius:9px;min-height:46px;padding:11px;width:100%}textarea{min-height:84px}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}.btn{border:0;border-radius:9px;font-weight:950;min-height:46px;padding:12px 16px;text-transform:uppercase}.primary{background:var(--g);color:#fff}.secondary{background:var(--s);color:var(--d)}.danger{background:#fff0ee;color:var(--r)}.hidden{display:none!important}.status{border-radius:9px;font-weight:800;margin-top:12px;padding:12px}.ok{background:var(--s);color:var(--d)}.bad{background:#fff0ee;color:var(--r)}.warn{background:#fff8dc;color:#7a5700}table{border-collapse:collapse;min-width:900px;width:100%}.table{overflow:auto}th,td{border-bottom:1px solid var(--l);padding:10px;text-align:left}th{background:var(--s);color:var(--d);font-size:12px;text-transform:uppercase}.total{align-items:center;display:flex;justify-content:space-between;margin-top:14px}.total strong{font-size:30px}@media(max-width:760px){.two,.three{grid-template-columns:1fr}.total{align-items:flex-start;flex-direction:column}}</style></head><body><main class="wrap"><section id="login" class="panel" style="max-width:520px;margin-top:12vh"><div class="brand"><span class="mark">DSB</span><div><h1>Admin Portal</h1><p>Invoice entry</p></div></div><label>Admin token<input id="token" type="password" placeholder="Private token"></label><div class="actions"><button class="btn primary" id="loginBtn">Log In</button></div><div id="loginMsg"></div></section><section id="app" class="hidden"><div class="brand"><span class="mark">DSB</span><div><h1>Admin Portal</h1><p>Add purchases to Google Sheets</p></div></div><section class="panel"><h2>Settings</h2><p>Paste your deployed Google Apps Script Web App URL. This saves only in your browser.</p><label>Apps Script URL<input id="url" placeholder="https://script.google.com/macros/s/.../exec"></label><div class="actions"><button class="btn secondary" id="saveUrl">Save URL</button></div><div id="settingsMsg"></div></section><section class="panel"><h2>Invoice</h2><div class="grid three"><label>Invoice ID<input id="invoice" readonly></label><label>Date<input id="date" type="date"></label><label>Payout<select id="pay"><option>Cash</option><option>Zelle</option><option>Cash App</option><option>Venmo</option><option>Other</option></select></label></div><div class="grid two" style="margin-top:14px"><label>Seller name<input id="seller"></label><label>Seller phone<input id="phone"></label></div><label style="margin-top:14px">Notes<textarea id="notes"></textarea></label></section><section class="panel"><h2>Add Item</h2><div class="grid three"><label>Category<select id="cat"><option>Diabetic Pods</option><option>CGM Supplies</option><option>Test Strips</option><option>Glucose Meter</option><option>Lancets</option><option>Other</option></select></label><label>Brand / item<input id="brand"></label><label>Model / description<input id="model"></label></div><div class="grid three" style="margin-top:14px"><label>Quantity<input id="qty" type="number" min="1" value="1"></label><label>Expiration<input id="exp" type="month"></label><label>Condition<select id="cond"><option>Sealed</option><option>New / Open Box</option><option>Damaged Box</option><option>Short Date</option></select></label></div><div class="grid two" style="margin-top:14px"><label>Cost each<input id="cost" type="number" min="0" step="0.01"></label><label>Expected sell each<input id="sell" type="number" min="0" step="0.01"></label></div><label style="margin-top:14px">Item notes<textarea id="itemNotes"></textarea></label><div class="actions"><button class="btn primary" id="add">Add Item</button><button class="btn secondary" id="clear">Clear Item</button></div></section><section class="panel"><h2>Items</h2><div class="table"><table><thead><tr><th>Category</th><th>Brand</th><th>Model</th><th>Qty</th><th>Exp</th><th>Condition</th><th>Cost</th><th>Total</th><th></th></tr></thead><tbody id="rows"></tbody></table></div><div class="total"><span>Invoice total cost</span><strong id="total">$0.00</strong></div><div class="actions"><button class="btn primary" id="submit">Submit To Google Sheets</button><button class="btn danger" id="reset">Clear Invoice</button></div><div id="msg"></div></section></section></main><script>let token='',items=[];const $=id=>document.getElementById(id),money=n=>Number(n||0).toLocaleString('en-US',{style:'currency',currency:'USD'}),esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));function stat(id,msg,t='ok'){$(id).innerHTML=msg?`<div class="status ${t}">${msg}</div>`:''}function stamp(){let d=new Date(),p=n=>String(n).padStart(2,'0');return `DSB-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}`}function start(){$('invoice').value=stamp();$('date').value=new Date().toISOString().slice(0,10);items=[];draw();stat('msg','')}function itemClear(){['brand','model','exp','cost','sell','itemNotes'].forEach(id=>$(id).value='');$('qty').value=1;$('cat').value='Diabetic Pods';$('cond').value='Sealed'}function draw(){$('rows').innerHTML=items.map((x,i)=>`<tr><td>${esc(x.category)}</td><td>${esc(x.brand)}</td><td>${esc(x.model)}</td><td>${x.quantity}</td><td>${esc(x.expiration)}</td><td>${esc(x.condition)}</td><td>${money(x.unitCost)}</td><td>${money(x.quantity*x.unitCost)}</td><td><button onclick="rem(${i})">Remove</button></td></tr>`).join('')||'<tr><td colspan="9">No items added yet.</td></tr>';$('total').textContent=money(items.reduce((s,x)=>s+x.quantity*x.unitCost,0))}window.rem=i=>{items.splice(i,1);draw()};$('loginBtn').onclick=()=>{token=$('token').value.trim();if(!token)return stat('loginMsg','Enter your token.','bad');$('login').classList.add('hidden');$('app').classList.remove('hidden');$('url').value=localStorage.dsb_script_url||'';start();itemClear()};$('saveUrl').onclick=()=>{localStorage.dsb_script_url=$('url').value.trim();stat('settingsMsg','URL saved.')};$('add').onclick=()=>{let x={category:$('cat').value,brand:$('brand').value.trim(),model:$('model').value.trim(),quantity:Number($('qty').value||0),expiration:$('exp').value,condition:$('cond').value,unitCost:Number($('cost').value||0),expectedSellPerBox:Number($('sell').value||0),notes:$('itemNotes').value.trim()};if(!x.brand&&!x.model)return stat('msg','Add a brand or model first.','bad');if(!x.quantity)return stat('msg','Quantity must be at least 1.','bad');items.push(x);itemClear();draw();stat('msg','Item added.')};$('clear').onclick=itemClear;$('reset').onclick=()=>confirm('Clear invoice?')&&start();$('submit').onclick=async()=>{let url=$('url').value.trim();if(!url)return stat('msg','Paste your Apps Script URL in Settings first.','bad');if(!items.length)return stat('msg','Add at least one item first.','bad');localStorage.dsb_script_url=url;stat('msg','Sending invoice to Google Sheets...','warn');let payload={source:'adminPortal',token,invoice:{invoiceId:$('invoice').value,purchaseDate:$('date').value,payoutMethod:$('pay').value,sellerName:$('seller').value,sellerPhone:$('phone').value,notes:$('notes').value},items};try{await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});stat('msg','Invoice sent. Check Google Sheets to confirm rows were added.')}catch(e){stat('msg','Could not send. Check the URL and token.','bad')}};</script></body></html>
